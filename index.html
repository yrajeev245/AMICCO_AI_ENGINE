<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parts Discount Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-header">
    <div class="header-left">
      <div class="logo-mark">PDE</div>
      <div>
        <h1>Parts Discount Engine</h1>
        <p class="subtitle">Garage Pricing & Deal Optimizer</p>
      </div>
    </div>
  </div>

  <div id="error-banner"></div>

  <div class="main-grid">

    <!-- LEFT: Cart Builder -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🛒 Build Cart</span>
        <button class="btn-add" onclick="addItem()">+ Add Part</button>
      </div>
      <!-- New rows prepended here -->
      <div id="cart"></div>

      <div class="target-bar">
        <label>🎯 Garage wants overall discount of</label>
        <div class="target-input-row">
          <input type="number" id="target-discount" placeholder="e.g. 8" min="0" max="30" step="0.5"/>
          <span class="pct-label">%</span>
          <button class="btn-primary" onclick="calculateCart()">Get Best Deal</button>
        </div>
      </div>

      <div id="recommendations-section" class="left-recommendations">
        <div class="section-label">🤝 Bought Together</div>
        <div id="recommendations">
          <p class="muted-note">Run Get Best Deal to see frequent bought together parts.</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: Results -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📊 Deal Summary</span>
      </div>

      <div id="summary-cards"></div>

      <div id="details-section" style="display:none">
        <div class="section-label">📦 Line Items</div>
        <div id="details"></div>

        <div class="section-label" style="margin-top:18px">💡 Smart Recommendations</div>
        <div id="suggestions"></div>

        <div id="target-advice-section" style="display:none">
          <div class="section-label" style="margin-top:18px">🎯 To Reach Target Discount</div>
          <div id="target-advice"></div>
        </div>

      </div>

      <div id="empty-state" class="empty-state">
        <div class="empty-icon">📋</div>
        <p>Add parts and click <strong>Get Best Deal</strong> to see pricing</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
